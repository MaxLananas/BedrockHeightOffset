name: BedrockHeightOffset
version: '1.0.0'
main: fr.buildtheearth.bedrockheightoffset.BedrockHeightOffset
api-version: '1.21'
description: Sliding window Y-offset translation for Bedrock players on BTE extended height worlds.
authors: [ BuildTheEarth ]

depend:
  - ProtocolLib

softdepend:
  - Geyser-Spigot
  - floodgate

commands:
  bho:
    description: BedrockHeightOffset admin commands
    usage: /bho <info|reload|offset <player>|list|debug>
    permission: bho.admin

permissions:
  bho.admin:
    description: Access to BHO admin commands
    default: op