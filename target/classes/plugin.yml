name: BedrockHeightOffset
version: '1.0.0'
main: fr.buildtheearth.bedrockheightoffset.BedrockHeightOffset
api-version: '1.21'
description: >
  Sliding window Y-offset translation for Bedrock players on BuildTheEarth
  extended height worlds (Y=-64 to Y=2032 via terraplusminus).
authors: [ BuildTheEarth ]
website: https://buildtheearth.net

depend:
  - ProtocolLib

softdepend:
  - Geyser-Spigot
  - floodgate

commands:
  bho:
    description: BedrockHeightOffset admin commands
    usage: /bho <info|reload|offset <player>|list>
    permission: bho.admin

permissions:
  bho.admin:
    description: Access to BHO admin commands
    default: op